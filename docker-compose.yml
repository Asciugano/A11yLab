services:
  db:
    image: mysql:8.0
    container_name: a11ylab-db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: a11ylab
      MYSQL_USER: a11yuser
      MYSQL_PASSWORD: a11ypass
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
