version: "3.9"

services:
  db:
    image: postgres:15
    container_name: a11ylab-postgres
    restart: always
    environment:
      POSTGRES_USER: a11yuser
      POSTGRES_PASSWORD: a11ypass
      POSTGRES_DB: a11ylab
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
